<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SEDO 72nd Congress — Palma de Mallorca 2026</title>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#3b5fe2"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<link rel="icon" href="icon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0f4f8;--card:#fff;--bdr:#e2e8f0;--txt:#0f172a;--mu:#64748b;--dim:#94a3b8;--blue:#3b5fe2;--b50:#eef2ff;--b100:#e0e7ff;--green:#16a34a;--g50:#f0fdf4;--red:#dc2626;--f:"DM Sans",sans-serif;--mono:"JetBrains Mono",monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:560px}
.brand{text-align:center;margin-bottom:28px}
.brand-logo{width:64px;height:64px;background:linear-gradient(135deg,#3b5fe2,#6366f1);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;box-shadow:0 8px 24px rgba(59,95,226,.3)}
.brand-name{font-size:26px;font-weight:800;letter-spacing:-.5px}
.brand-sub{font-size:13px;color:var(--mu);margin-top:4px}
.card{background:var(--card);border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.05);padding:32px;margin-bottom:16px}
.hero{text-align:center;padding:36px 32px}
.pill{display:inline-block;background:var(--b50);color:var(--blue);font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:6px 14px;border-radius:999px;margin-bottom:16px}
.title{font-size:30px;font-weight:800;letter-spacing:-.6px;line-height:1.15}
.subtitle{font-size:16px;color:var(--mu);margin-top:8px;font-weight:600}
.year{font-family:var(--mono);font-size:14px;color:var(--dim);margin-top:6px;letter-spacing:1px}
.sect-label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.venue{display:flex;align-items:flex-start;gap:14px}
.venue-icon{flex:0 0 auto;width:44px;height:44px;border-radius:12px;background:var(--g50);display:flex;align-items:center;justify-content:center;font-size:22px}
.venue-addr{font-size:15px;line-height:1.6;color:var(--txt)}
.venue-addr strong{display:block;font-weight:700;margin-bottom:2px}
.btn{display:block;width:100%;text-align:center;padding:13px;background:linear-gradient(135deg,#3b5fe2,#4f6ef7);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--f);text-decoration:none;transition:all .15s;box-shadow:0 4px 14px rgba(59,95,226,.3);margin-top:18px}
.btn:hover{filter:brightness(1.07);transform:translateY(-1px)}
.foot{text-align:center;margin-top:8px;font-size:12px;color:var(--dim)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-logo">🦷</div>
    <div class="brand-name">SEDO 72nd Congress</div>
    <div class="brand-sub">Sociedad Española de Ortodoncia</div>
  </div>

  <div class="card hero">
    <div class="pill">72nd Annual Congress</div>
    <div class="title">SEDO 72nd Congress</div>
    <div class="subtitle">Palma de Mallorca</div>
    <div class="year">2026</div>
  </div>

  <div class="card">
    <div class="sect-label">Venue &amp; Address</div>
    <div class="venue">
      <div class="venue-icon">📍</div>
      <div class="venue-addr">
        <strong>Palma de Mallorca</strong>
        Carrer de Felicia Fuster, 2<br/>
        Llevant, 07006 Palma<br/>
        Illes Balears, Spain
      </div>
    </div>
    <a class="btn" target="_blank" rel="noopener"
       href="https://www.google.com/maps/search/?api=1&query=Carrer+de+Felicia+Fuster+2+07006+Palma+Illes+Balears+Spain">
      Open in Maps →
    </a>
  </div>

  <div class="foot">© 2026 SEDO 72nd Congress — Palma de Mallorca</div>
</div>
</body>
</html>
