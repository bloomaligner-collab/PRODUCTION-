name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund

      - name: HTML validation
        run: npm run check:html

      - name: JS syntax (files + inline scripts)
        run: npm run check:js

      - name: DOM ID references
        run: npm run check:ids
