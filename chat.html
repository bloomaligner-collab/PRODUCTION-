<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="cw-page" content="chat"/>
<title>Cedarwings SAS — Team Chat</title>
<script type="module" src="auth_guard.js?v=20260422c"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--bdr:#e2e8f0;--txt:#0f172a;--mu:#64748b;--dim:#94a3b8;
  --blue:#3b5fe2;--b50:#eef2ff;--b100:#e0e7ff;
  --green:#16a34a;--g50:#f0fdf4;--g100:#dcfce7;
  --amber:#d97706;--a50:#fffbeb;--a100:#fef3c7;
  --red:#dc2626;--r50:#fef2f2;--r100:#fee2e2;
  --purple:#7c3aed;--teal:#0d9488;
  --f:"DM Sans",sans-serif;--mono:"JetBrains Mono",monospace;
  --sh:0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);
  --sh2:0 6px 24px rgba(0,0,0,.09),0 0 0 1px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}
a{color:inherit;text-decoration:none}

/* APP SIDEBAR — shared .sb shell, populated by access.js ────────── */
.sb{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--card);border-right:1px solid var(--bdr);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-top{display:flex;align-items:center;gap:12px;padding:20px 18px 16px;border-bottom:1px solid var(--bdr)}
.logo{width:38px;height:38px;background:linear-gradient(135deg,#3b5fe2,#6366f1);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sb-nm{font-weight:800;font-size:14px}
.sb-role{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;margin-top:3px;background:var(--b50);color:var(--blue)}
.sb-nav{flex:1;padding:10px}
.sb-s{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;padding:14px 8px 6px}
.nl{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;font-size:13px;font-weight:500;color:var(--mu);text-decoration:none;transition:all .12s}
.nl:hover{background:var(--bg);color:var(--txt)}
.nl.on{background:var(--b50);color:var(--blue);font-weight:700}
.nl .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-foot{padding:12px 10px;border-top:1px solid var(--bdr)}

.content{margin-left:240px;height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.tb-hi{font-size:18px;font-weight:800;letter-spacing:-.3px}
.tb-sub{font-size:11px;color:var(--mu);margin-top:2px}
.online-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;vertical-align:middle;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* CHAT SHELL ────────────────────────────────────────────────── */
.chat-shell{flex:1;display:flex;min-height:0;overflow:hidden;background:var(--bg)}

/* CONVERSATIONS LIST ────────────────────────────────────────── */
.convo-rail{width:300px;background:var(--card);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0}
.convo-search{padding:14px 14px 10px;border-bottom:1px solid var(--bdr)}
.convo-search input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--bdr);border-radius:9px;font-family:var(--f);font-size:13px;background:#f8fafc;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='%2364748b' viewBox='0 0 16 16'><path d='M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0'/></svg>");background-repeat:no-repeat;background-position:11px center}
.convo-search input:focus{outline:none;border-color:var(--blue);background-color:var(--card)}
.convo-list{flex:1;overflow-y:auto;padding:6px}
.convo-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:background .12s;border:1px solid transparent}
.convo-item:hover{background:#f8fafc}
.convo-item.active{background:var(--b50);border-color:var(--b100)}
.convo-av{width:38px;height:38px;border-radius:11px;color:#fff;font-weight:800;font-size:13px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.convo-av.group{background:linear-gradient(135deg,#3b5fe2,#6366f1)}
.convo-info{flex:1;min-width:0}
.convo-name{font-size:13px;font-weight:700;letter-spacing:-.1px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.convo-sub{font-size:11px;color:var(--mu);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.convo-empty{padding:30px 16px;text-align:center;color:var(--dim);font-size:12px;line-height:1.5}

/* MAIN CHAT PANE ───────────────────────────────────────────── */
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.chat-header{padding:14px 22px;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-h-av{width:36px;height:36px;border-radius:10px;color:#fff;font-weight:800;font-size:13px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-h-av.group{background:linear-gradient(135deg,#3b5fe2,#6366f1)}
.chat-h-name{font-size:14px;font-weight:800;letter-spacing:-.1px}
.chat-h-sub{font-size:11px;color:var(--mu);margin-top:2px}

/* MESSAGES SCROLL AREA ─────────────────────────────────────── */
.msg-scroll{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
.msg-empty{margin:auto;text-align:center;color:var(--dim);font-size:13px;padding:40px 20px}
.msg-empty-emoji{font-size:48px;margin-bottom:12px;opacity:.5}

/* DAY DIVIDER */
.day-div{display:flex;align-items:center;gap:10px;margin:18px 0 8px;font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px}
.day-div::before,.day-div::after{content:"";flex:1;height:1px;background:var(--bdr)}

/* MESSAGE ROW — flex container, "me" aligns right by reversing direction */
.msg{display:flex;gap:8px;align-items:flex-end;max-width:78%}
.msg.me{flex-direction:row-reverse;margin-left:auto}
.msg.them{margin-right:auto}
.msg-av{width:30px;height:30px;border-radius:9px;color:#fff;font-weight:800;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.msg.me .msg-av{display:none}
.msg-av.gap{visibility:hidden}
.msg-body{display:flex;flex-direction:column;min-width:0}
.msg.me .msg-body{align-items:flex-end}
.msg-meta{font-size:11px;color:var(--mu);margin:0 4px 3px;display:flex;align-items:center;gap:6px}
.msg-meta strong{color:var(--txt);font-weight:700}
.msg.me .msg-meta{display:none}
.msg-bubble{padding:8px 12px;border-radius:14px;font-size:13.5px;line-height:1.45;word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap;box-shadow:0 1px 1px rgba(0,0,0,.04);max-width:100%}
.msg.them .msg-bubble{background:var(--card);color:var(--txt);border-bottom-left-radius:4px;border:1px solid var(--bdr)}
.msg.me   .msg-bubble{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:10px;color:var(--dim);margin:2px 6px 0;font-variant-numeric:tabular-nums}

/* INPUT BAR ────────────────────────────────────────────────── */
.composer{background:var(--card);border-top:1px solid var(--bdr);padding:12px 18px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.composer textarea{flex:1;padding:10px 14px;border:1.5px solid var(--bdr);border-radius:14px;font-family:var(--f);font-size:13.5px;line-height:1.4;resize:none;max-height:120px;min-height:42px;background:var(--bg);color:var(--txt);transition:border-color .12s,background .12s}
.composer textarea:focus{outline:none;border-color:var(--blue);background:var(--card)}
.composer button{width:42px;height:42px;border:none;border-radius:50%;background:var(--blue);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .12s,transform .08s}
.composer button:hover{background:#2e4fc7}
.composer button:active{transform:scale(.92)}
.composer button:disabled{background:var(--dim);cursor:not-allowed}

.notif{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:10px;background:var(--card);box-shadow:var(--sh2);font-size:13px;font-weight:600;z-index:300;transform:translateY(120%);transition:transform .25s ease;max-width:380px}
.notif.on{transform:translateY(0)}
.notif.ok{border-left:4px solid var(--green);color:var(--green)}
.notif.err{border-left:4px solid var(--red);color:var(--red)}

/* MOBILE — hide convo list when a conversation is open ──────── */
@media (max-width:780px){
  html, body { height: 100dvh; }
  body { overflow: hidden; }
  .content { height: 100dvh; }
  .chat-shell { height: 100%; }

  .sb{transform:translateX(-100%);transition:transform .22s ease;width:84vw;max-width:280px}
  .sb.open{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,.2)}
  .cw-mobile-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:99;opacity:0;pointer-events:none;transition:opacity .2s}
  .cw-mobile-backdrop.on{opacity:1;pointer-events:auto}
  .content{margin-left:0}
  .menu-btn{display:inline-flex !important}
  .topbar{padding:10px 14px}
  .topbar .tb-hi{font-size:16px}
  .topbar .tb-sub{font-size:10px}
  .convo-rail{width:100%;position:absolute;left:0;top:0;bottom:0;z-index:5;background:var(--card)}
  .chat-shell.viewing .convo-rail{display:none}
  .chat-shell:not(.viewing) .chat-main{display:none}
  .back-btn{display:inline-flex !important}
  .chat-header{padding:12px 14px}
  .chat-h-name{font-size:15px}
  .chat-h-sub{font-size:11px}
  .msg-scroll{padding:14px 12px 18px;gap:8px}
  .msg{max-width:86%}
  .msg-av{width:34px;height:34px;font-size:12px;border-radius:10px}
  .msg-meta{font-size:12px;margin:0 4px 4px}
  .msg-bubble{font-size:15px;padding:10px 14px;line-height:1.45;border-radius:16px}
  .msg-time{font-size:11px;margin-top:4px}
  .day-div{font-size:11px;margin:14px 0 10px}
  .composer{
    padding:12px 12px calc(14px + env(safe-area-inset-bottom)) 12px;
    gap:8px;
    align-items:center;
    background:var(--card);
    box-shadow:0 -2px 8px rgba(15,23,42,.04);
  }
  .composer textarea{
    font-size:16px;
    padding:12px 16px;
    min-height:46px;
    border-radius:22px;
    line-height:1.4;
  }
  .composer button{
    width:46px;height:46px;
    font-size:19px;
    box-shadow:0 2px 8px rgba(59,95,226,.3);
  }
}
.menu-btn,.back-btn,.mute-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:9px;background:var(--card);border:1px solid var(--bdr);cursor:pointer;font-size:16px;flex-shrink:0;font-family:inherit}
.mute-btn{display:inline-flex}
.mute-btn:hover{background:var(--bg)}
.convo-unread{margin-left:auto;background:var(--blue);color:#fff;border-radius:999px;font-size:10px;font-weight:800;min-width:18px;height:18px;padding:0 5px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.convo-item.active .convo-unread{background:#fff;color:var(--blue)}
</style>
</head>
<body>

<aside class="sb" id="sidebar">
  <div class="sb-top">
    <div class="logo">⚙</div>
    <div>
      <div class="sb-nm">Cedarwings SAS</div>
      <div class="sb-role" id="sb-role-lbl">Manager</div>
    </div>
  </div>
  <nav class="sb-nav"></nav>
  <div class="sb-foot"></div>
</aside>

<div class="content">
  <div class="topbar">
    <div style="display:flex;gap:10px;align-items:center">
      <button class="menu-btn" id="menuBtn" type="button" aria-label="Open menu">☰</button>
      <div>
        <div class="tb-hi">💬 Team Chat</div>
        <div class="tb-sub"><span class="online-dot"></span>Live messaging between staff</div>
      </div>
    </div>
    <button class="mute-btn" id="muteBtn" type="button" title="Notification alerts">🔔</button>
  </div>

  <div class="chat-shell" id="chatShell">
    <!-- LEFT: conversation list -->
    <aside class="convo-rail" id="convoRail">
      <div class="convo-search">
        <input type="search" id="convoSearch" placeholder="Search teammates…" autocomplete="off"/>
      </div>
      <div class="convo-list" id="convoList">
        <div class="convo-empty">⏳ Loading conversations…</div>
      </div>
    </aside>

    <!-- RIGHT: messages + composer -->
    <section class="chat-main">
      <div class="chat-header" id="chatHeader">
        <button class="back-btn" id="backBtn" type="button" aria-label="Back to conversations">←</button>
        <div class="chat-h-av group" id="chatHAv">🌐</div>
        <div>
          <div class="chat-h-name" id="chatHName">All Team</div>
          <div class="chat-h-sub" id="chatHSub">Everyone in this conversation</div>
        </div>
      </div>

      <div class="msg-scroll" id="msgScroll">
        <div class="msg-empty">
          <div class="msg-empty-emoji">💬</div>
          <div>Loading messages…</div>
        </div>
      </div>

      <div class="composer">
        <textarea id="msgInput" rows="1" placeholder="Type a message — Enter to send, Shift+Enter for new line…"></textarea>
        <button id="sendBtn" type="button" title="Send (Enter)">➤</button>
      </div>
    </section>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>const PAGE_KEY='chat'</script>
<script src="access.js?v=20260422c"></script>
<script src="lang.js?v=20260520180000"></script>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
import { SUPABASE_CONFIG } from './config.js'
import { createChatAttachments, attachmentsHtml, hydrateAttachments } from './chat_media.js'
const sb = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey)

// Shared chat prefs/seen API from access.js (loaded before this module).
const CHAT = (window.CW_ACCESS && CW_ACCESS.chat) || null

const $ = id => document.getElementById(id)
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
function ntf(msg, kind){
  const el = $('notif'); el.textContent = msg
  el.className = 'notif on ' + (kind === 'err' ? 'err' : 'ok')
  setTimeout(() => el.className = 'notif', 4000)
}
function initials(n){ if(!n) return '—'; return n.trim().split(/\s+/).slice(0,2).map(p=>p[0]||'').join('').toUpperCase()||'—' }
function avatarColor(s){
  const palette = ['#3b5fe2','#16a34a','#d97706','#7c3aed','#0d9488','#dc2626','#0891b2','#db2777']
  let h = 0; for (const c of (s||'')) h = (h*31 + c.charCodeAt(0)) >>> 0
  return palette[h % palette.length]
}
function fmtTime(d){
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
}
function fmtDayHeader(d){
  const today = new Date(); today.setHours(0,0,0,0)
  const yest  = new Date(today); yest.setDate(yest.getDate() - 1)
  const that  = new Date(d);     that.setHours(0,0,0,0)
  if (that.getTime() === today.getTime()) return 'Today'
  if (that.getTime() === yest.getTime())  return 'Yesterday'
  return d.toLocaleDateString([], { weekday: 'short', day: '2-digit', month: 'short', year: that.getFullYear() === today.getFullYear() ? undefined : 'numeric' })
}
function sameDay(a, b){ return a.toDateString() === b.toDateString() }

$('menuBtn').addEventListener('click', e => {
  e.stopPropagation()
  let backdrop = document.querySelector('.cw-mobile-backdrop')
  if (!backdrop) {
    backdrop = document.createElement('div')
    backdrop.className = 'cw-mobile-backdrop'
    document.body.appendChild(backdrop)
    backdrop.addEventListener('click', () => {
      $('sidebar').classList.remove('open')
      backdrop.classList.remove('on')
    })
  }
  const open = !$('sidebar').classList.contains('open')
  $('sidebar').classList.toggle('open', open)
  backdrop.classList.toggle('on', open)
})
$('backBtn').addEventListener('click', () => $('chatShell').classList.remove('viewing'))

// Notification alerts toggle — cycles: all on → sound off → all off.
function muteState(){
  if (!CHAT) return 0
  if (CHAT.muteToast()) return 2          // everything off
  if (CHAT.muteSound()) return 1          // toasts only, no sound
  return 0                                // all on
}
function paintMute(){
  const b = $('muteBtn'); if (!b) return
  const s = muteState()
  b.textContent = s === 2 ? '🔕' : s === 1 ? '🔈' : '🔔'
  b.title = s === 2 ? 'Alerts off — click to enable'
          : s === 1 ? 'Pop-ups only (sound off) — click to mute all'
          : 'Sound + pop-up alerts on — click for sound off'
}
$('muteBtn').addEventListener('click', () => {
  if (!CHAT) return
  const s = (muteState() + 1) % 3
  CHAT.setMuteSound(s >= 1)
  CHAT.setMuteToast(s === 2)
  paintMute()
  ntf(s === 2 ? 'Chat alerts muted' : s === 1 ? 'Sound off — pop-ups still shown' : 'Chat alerts on', 'ok')
})
window.addEventListener('cw-chat-pref', paintMute)
paintMute()

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let me            = null      // employees row of the signed-in user
let employees     = []        // every active+linked employee (excludes me)
let employeeById  = new Map() // id → employee (used to show sender names + avatars)
let currentConvo  = { type: 'group', id: null }   // group | dm
let messages      = []        // currently displayed conversation
let realtimeChan  = null
let unread        = new Map()  // conversation key → unread count

function convoSeenArgs(c){ return c.type === 'group' ? ['group', null] : ['dm', c.id] }
function convoKey(c){ return c.type === 'group' ? 'group' : 'dm:' + c.id }
function markConvoSeen(c, iso){ if (CHAT) CHAT.markSeen(...convoSeenArgs(c), iso) }
// Recompute per-conversation unread from one lightweight query.
async function refreshUnread(){
  if (!CHAT || !me) return
  try {
    const { data } = await sb.from('chat_messages')
      .select('id,sender_id,recipient_id,case_id,created_at')
      .or(`and(recipient_id.is.null,case_id.is.null),recipient_id.eq.${me.id}`)
      .order('created_at', { ascending: false }).limit(500)
    const next = new Map()
    for (const m of (data || [])) {
      if (m.sender_id === me.id) continue
      let key, kind, kid
      if (m.recipient_id == null) { key = 'group'; kind = 'group'; kid = null }
      else { key = 'dm:' + m.sender_id; kind = 'dm'; kid = m.sender_id }
      // The open conversation is always considered read.
      if (key === convoKey(currentConvo)) continue
      if (CHAT.isNewer(m.created_at, kind, kid)) next.set(key, (next.get(key) || 0) + 1)
    }
    unread = next
    renderConvoList($('convoSearch').value)
  } catch {}
}

// ════════════════════════════════════════════════════════════════
//  BOOTSTRAP — figure out who I am
// ════════════════════════════════════════════════════════════════
async function bootstrap(){
  const { data: { user } } = await sb.auth.getUser()
  if (!user) { location.replace('index.html'); return }

  // Look up MY employee row
  const { data: meRow, error: meErr } = await sb.from('employees')
    .select('id,name,email,role,custom_role,auth_user_id')
    .eq('auth_user_id', user.id).maybeSingle()
  if (meErr) { ntf('Could not load your profile: ' + meErr.message, 'err'); return }
  if (!meRow) {
    ntf('Your auth user is not linked to an employee record. Ask an admin to link you in Settings.', 'err')
    $('msgScroll').innerHTML = `<div class="msg-empty"><div class="msg-empty-emoji">🚫</div><div>You don't have an employee profile yet.<br>Ask a manager to add you in <strong>Settings → Employees</strong>.</div></div>`
    return
  }
  me = meRow

  // Load every other active+linked employee (potential DM partners)
  const { data: emps } = await sb.from('employees')
    .select('id,name,email,role,custom_role')
    .eq('is_active', true).not('auth_user_id', 'is', null).order('name')
  employees    = (emps || []).filter(e => e.id !== me.id)
  employeeById = new Map((emps || []).map(e => [e.id, e]))
  employeeById.set(me.id, me)

  renderConvoList()
  // Honor ?convo=group or ?convo=dm&partner=<id> from notification links
  const params = new URLSearchParams(location.search)
  const convoQ = params.get('convo')
  const partnerQ = params.get('partner')
  if (convoQ === 'dm' && partnerQ && employeeById.has(partnerQ)) {
    await openConversation({ type: 'dm', id: partnerQ })
  } else {
    await openConversation({ type: 'group', id: null })
  }
  subscribeRealtime()
  refreshUnread()
  // Returning to the tab marks the open conversation read.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && messages.length) {
      markConvoSeen(currentConvo, messages[messages.length - 1].created_at)
      unread.delete(convoKey(currentConvo))
      renderConvoList($('convoSearch').value)
    }
  })
}

// ════════════════════════════════════════════════════════════════
//  CONVERSATION LIST
// ════════════════════════════════════════════════════════════════
function renderConvoList(filter = ''){
  const list = $('convoList')
  const q = filter.trim().toLowerCase()
  const matchesGroup = !q || 'all team'.includes(q) || 'team chat'.includes(q)
  const dmRows = employees
    .filter(e => !q || e.name.toLowerCase().includes(q) || (e.email||'').toLowerCase().includes(q))
    .map(e => {
      const active = currentConvo.type === 'dm' && currentConvo.id === e.id
      const u = unread.get('dm:' + e.id) || 0
      return `<div class="convo-item ${active?'active':''}" data-type="dm" data-id="${esc(e.id)}">
        <div class="convo-av" style="background:${avatarColor(e.name)}">${esc(initials(e.name))}</div>
        <div class="convo-info">
          <div class="convo-name">${esc(e.name)}</div>
          <div class="convo-sub">${esc(e.email || '')}</div>
        </div>
        ${u ? `<span class="convo-unread">${u>99?'99+':u}</span>` : ''}
      </div>`
    }).join('')

  const gu = unread.get('group') || 0
  const groupRow = matchesGroup ? `<div class="convo-item ${currentConvo.type==='group'?'active':''}" data-type="group">
    <div class="convo-av group">🌐</div>
    <div class="convo-info">
      <div class="convo-name">All Team</div>
      <div class="convo-sub">Everyone — group chat</div>
    </div>
    ${gu ? `<span class="convo-unread">${gu>99?'99+':gu}</span>` : ''}
  </div>` : ''

  if (!groupRow && !dmRows) {
    list.innerHTML = `<div class="convo-empty">No teammates match "${esc(filter)}"</div>`
    return
  }
  list.innerHTML = groupRow + (dmRows || '')

  list.querySelectorAll('.convo-item').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.type
      const id = el.dataset.id || null
      openConversation({ type: t, id })
    })
  })
}
$('convoSearch').addEventListener('input', e => renderConvoList(e.target.value))

// ════════════════════════════════════════════════════════════════
//  OPEN A CONVERSATION → LOAD MESSAGES
// ════════════════════════════════════════════════════════════════
async function openConversation(c){
  currentConvo = c
  renderConvoList($('convoSearch').value)
  $('chatShell').classList.add('viewing')

  // Header
  if (c.type === 'group') {
    $('chatHAv').className = 'chat-h-av group'
    $('chatHAv').textContent = '🌐'
    $('chatHName').textContent = 'All Team'
    $('chatHSub').textContent  = `${employees.length + 1} member${employees.length === 0 ? '' : 's'} · group chat`
  } else {
    const e = employeeById.get(c.id)
    $('chatHAv').className = 'chat-h-av'
    $('chatHAv').style.background = avatarColor(e?.name || '')
    $('chatHAv').textContent = initials(e?.name || '?')
    $('chatHName').textContent = e?.name || 'Unknown'
    $('chatHSub').textContent  = e?.email || ''
  }

  // Pull message history
  $('msgScroll').innerHTML = `<div class="msg-empty"><div class="msg-empty-emoji">⏳</div><div>Loading messages…</div></div>`
  let q = sb.from('chat_messages')
    .select('id,sender_id,recipient_id,body,created_at,attachments')
    .order('created_at', { ascending: true })
    .limit(500)
  if (c.type === 'group') {
    q = q.is('recipient_id', null).is('case_id', null)
  } else {
    // Either side of the DM
    q = q.or(`and(sender_id.eq.${me.id},recipient_id.eq.${c.id}),and(sender_id.eq.${c.id},recipient_id.eq.${me.id})`)
  }
  const { data, error } = await q
  if (error) { ntf('Could not load messages: ' + error.message, 'err'); return }
  messages = data || []
  renderMessages()
  // Opening a conversation marks it read up to its latest message.
  const last = messages[messages.length - 1]
  markConvoSeen(c, last ? last.created_at : undefined)
  unread.delete(convoKey(c))
  renderConvoList($('convoSearch').value)
}

// ════════════════════════════════════════════════════════════════
//  RENDER MESSAGES — left/right by sender, day dividers, time stamps
// ════════════════════════════════════════════════════════════════
function renderMessages(){
  const box = $('msgScroll')
  if (!messages.length) {
    box.innerHTML = `<div class="msg-empty">
      <div class="msg-empty-emoji">💬</div>
      <div><strong>No messages yet</strong><br>Be the first to say something — it'll go to ${currentConvo.type === 'group' ? 'everyone' : 'them'} in real time.</div>
    </div>`
    return
  }
  let html = ''
  let lastDay  = null
  let lastSender = null
  for (const m of messages) {
    const d = new Date(m.created_at)
    if (!lastDay || !sameDay(d, lastDay)) {
      html += `<div class="day-div">${esc(fmtDayHeader(d))}</div>`
      lastDay = d
      lastSender = null
    }
    const isMe   = m.sender_id === me.id
    const sender = employeeById.get(m.sender_id)
    const sName  = sender?.name || 'Unknown'
    const sameAuthor = (m.sender_id === lastSender)
    const avClass = sameAuthor ? 'msg-av gap' : 'msg-av'
    const metaHtml = isMe ? '' : sameAuthor
      ? '' /* compact: no repeat header for consecutive messages */
      : `<div class="msg-meta"><strong>${esc(sName)}</strong><span>${esc(fmtTime(d))}</span></div>`
    const myTime = isMe ? `<div class="msg-time">${esc(fmtTime(d))}</div>` : ''
    const bodyHtml = (m.body && m.body.trim()) ? `<div class="msg-bubble">${esc(m.body)}</div>` : ''
    const attHtml  = attachmentsHtml(m.attachments)
    html += `<div class="msg ${isMe ? 'me' : 'them'}" data-msg-id="${esc(m.id)}">
      <div class="${avClass}" style="background:${avatarColor(sName)}">${esc(initials(sName))}</div>
      <div class="msg-body">
        ${metaHtml}
        ${bodyHtml}
        ${attHtml}
        ${myTime}
      </div>
    </div>`
    lastSender = m.sender_id
  }
  box.innerHTML = html
  box.scrollTop = box.scrollHeight
  hydrateAttachments(sb, box)
}

// ════════════════════════════════════════════════════════════════
//  REALTIME — listen for any new message, append to view if relevant
// ════════════════════════════════════════════════════════════════
function subscribeRealtime(){
  if (realtimeChan) sb.removeChannel(realtimeChan)
  realtimeChan = sb.channel('chat-messages-feed')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
      const m = payload.new
      if (!m) return
      // Already in DOM? (we appended optimistically when sending)
      if (document.querySelector(`[data-msg-id="${m.id}"]`)) return
      if (m.case_id) return   // case threads live on the feedback page
      const inOpen = currentConvo.type === 'group'
        ? (m.recipient_id === null)
        : ((m.sender_id === me.id && m.recipient_id === currentConvo.id) ||
           (m.sender_id === currentConvo.id && m.recipient_id === me.id))
      if (inOpen) {
        messages.push(m)
        renderMessages()
        if (document.visibilityState === 'visible' && m.sender_id !== me.id)
          markConvoSeen(currentConvo, m.created_at)
        return
      }
      if (m.sender_id === me.id) return
      const key = m.recipient_id === null ? 'group'
                : m.recipient_id === me.id ? 'dm:' + m.sender_id : null
      if (!key) return
      unread.set(key, (unread.get(key) || 0) + 1)
      renderConvoList($('convoSearch').value)
    })
    .subscribe()
}

// ════════════════════════════════════════════════════════════════
//  COMPOSER — Enter to send, Shift+Enter for newline, auto-grow
// ════════════════════════════════════════════════════════════════
const input = $('msgInput')
input.addEventListener('input', () => {
  input.style.height = 'auto'
  input.style.height = Math.min(input.scrollHeight, 120) + 'px'
})
input.addEventListener('focus', () => {
  setTimeout(() => {
    const scroll = document.querySelector('.msg-scroll')
    if (scroll) scroll.scrollTop = scroll.scrollHeight
    setTimeout(() => { if (scroll) scroll.scrollTop = scroll.scrollHeight }, 300)
  }, 100)
})
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
})
$('sendBtn').addEventListener('click', sendMessage)

const attach = createChatAttachments({
  sb,
  composerEl:     document.querySelector('.composer'),
  insertBeforeEl: $('sendBtn'),
  notify:         ntf,
})

async function sendMessage(){
  if (!me) return
  const body = input.value.trim()
  const hasFiles = attach.hasPending()
  if (!body && !hasFiles) return
  if (body.length > 4000) { ntf('Message too long (max 4000 chars)', 'err'); return }

  $('sendBtn').disabled = true
  let files = []
  if (hasFiles) {
    try { files = await attach.upload() }
    catch { $('sendBtn').disabled = false; return }
  }
  const rec = {
    sender_id:    me.id,
    recipient_id: currentConvo.type === 'group' ? null : currentConvo.id,
    body,
    attachments:  files
  }
  // Clear input optimistically
  const original = input.value
  input.value = ''
  input.style.height = 'auto'

  const { data, error } = await sb.from('chat_messages').insert([rec]).select().single()
  $('sendBtn').disabled = false
  if (error) {
    const authIssue = error.code === '42501' || /row-level security/i.test(error.message || '')
    if (authIssue) {
      const { data: { user } } = await sb.auth.getUser().catch(() => ({ data: { user: null } }))
      ntf(user
        ? 'Could not send — you don’t have access to this conversation.'
        : 'Your session expired. Please sign in again to keep chatting.', 'err')
      if (!user) setTimeout(() => location.replace('index.html'), 2500)
    } else {
      ntf('Send failed: ' + error.message, 'err')
    }
    input.value = original
    input.focus()
    return
  }
  // Append to view immediately (realtime will skip it via the dedup check)
  messages.push(data)
  renderMessages()
  input.focus()
}

bootstrap()
</script>
